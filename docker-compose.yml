# 운영 배포용 (선택). PostgreSQL + 백엔드 API + 프론트엔드(빌드 후 정적 서빙).
# 개발 시에는 README의 로컬 실행 방법을 사용하세요.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/team_management
      SECRET_KEY: change-this-secret-key-in-production
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
